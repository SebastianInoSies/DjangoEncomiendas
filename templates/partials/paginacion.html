<nav aria-label="Paginación" class="mt-3">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
        <li class="page-item">
            <a class="page-link" href="?page=1{% if q %}&q={{ q }}{% endif %}{% if estado_activo %}&estado={{ estado_activo }}{% endif %}">
                &laquo; Primera
            </a>
        </li>
        <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if q %}&q={{ q }}{% endif %}{% if estado_activo %}&estado={{ estado_activo }}{% endif %}">
                &lsaquo; Anterior
            </a>
        </li>
        {% endif %}

        <li class="page-item active">
            <span class="page-link">
                Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
            </span>
        </li>

        {% if page_obj.has_next %}
        <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.next_page_number }}{% if q %}&q={{ q }}{% endif %}{% if estado_activo %}&estado={{ estado_activo }}{% endif %}">
                Siguiente &rsaquo;
            </a>
        </li>
        <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.paginator.num_pages }}{% if q %}&q={{ q }}{% endif %}{% if estado_activo %}&estado={{ estado_activo }}{% endif %}">
                Última &raquo;
            </a>
        </li>
        {% endif %}
    </ul>
</nav>
